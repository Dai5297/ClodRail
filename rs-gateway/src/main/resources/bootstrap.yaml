spring:
  profiles:
    active: dev
  application:
    name: rs-gateway
  cloud:
    nacos:
      server-addr: 127.0.0.1:8848
      discovery:
        namespace: 83a90920-a536-4767-b536-3e99c506b1a0
      config:
        namespace: 83a90920-a536-4767-b536-3e99c506b1a0
        file-extension: yaml
    gateway:
      routes:
        - id: user-service
          uri: lb://customer-service
          predicates:
            - Path=/customer/user/**, /customer/account/**, /customer/contact/**
        - id: ticket-service
          uri: lb://ticket-service
          predicates:
            - Path=/customer/tickets/**, /customer/stations/**, /customer/seats/**, /inner/ticket/**
        - id: order-service
          uri: lb://order-service
          predicates:
            - Path=/customer/orders/**
        - id: assistant-service
          uri: lb://assistant-service
          predicates:
            - Path=/customer/assistant/**
  config:
    import:
      - nacos:shared-redis.yaml
  main:
    web-application-type: reactive
server:
  port: 18080
