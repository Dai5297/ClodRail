spring:
  application:
    name: rs-gateway
  cloud:
    nacos:
      server-addr: 127.0.0.1:8848
      discovery:
        namespace: 83a90920-a536-4767-b536-3e99c506b1a0
    gateway:
      routes:
        - id: customer-service
          uri: lb://customer-service
          predicates:
            - Path=/user/**, /account/**, /contact/**, /customer-service/**
  main:
    web-application-type: reactive
server:
  port: 18080