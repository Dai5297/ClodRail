<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>客服运营 - 铁路票务管理系统</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="../css/admin.css">
</head>
<body>
    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <img src="https://trae-api-sg.mchost.guru/api/ide/v1/text_to_image?prompt=modern%20minimalist%20train%20logo%20icon%20blue%20gradient%20circular%20design&image_size=square" alt="Logo" class="logo">
            <h3>管理系统</h3>
        </div>
        <nav class="sidebar-menu">
            <a href="../index.html" class="menu-item">
                <i class="fas fa-tachometer-alt"></i>
                <span>仪表板</span>
            </a>
            <a href="users.html" class="menu-item">
                <i class="fas fa-users"></i>
                <span>用户管理</span>
            </a>
            <a href="trains.html" class="menu-item">
                <i class="fas fa-train"></i>
                <span>车次管理</span>
            </a>
            <a href="orders.html" class="menu-item">
                <i class="fas fa-ticket-alt"></i>
                <span>订单管理</span>
            </a>
            <a href="statistics.html" class="menu-item">
                <i class="fas fa-chart-bar"></i>
                <span>数据统计</span>
            </a>
            <a href="assistant.html" class="menu-item active" data-roles="SUPER_ADMIN,CS">
                <i class="fas fa-headset"></i>
                <span>客服运营</span>
            </a>
            <a href="assistant-reply.html" class="menu-item" data-roles="SUPER_ADMIN,CS">
                <i class="fas fa-comment-dots"></i>
                <span>客服回复</span>
            </a>
            <a href="settings.html" class="menu-item">
                <i class="fas fa-cog"></i>
                <span>系统设置</span>
            </a>
        </nav>
    </div>

    <div class="main-content">
        <div class="top-navbar">
            <div class="navbar-left">
                <button class="sidebar-toggle" id="sidebarToggle">
                    <i class="fas fa-bars"></i>
                </button>
                <div class="breadcrumb">
                    <a href="../index.html"><i class="fas fa-home"></i></a>
                    <span>/</span>
                    <span>客服运营</span>
                </div>
            </div>
            <div class="navbar-right">
                <div class="user-info" onclick="showUserMenu()">
                    <div class="user-avatar">
                        <i class="fas fa-user"></i>
                    </div>
                    <span id="adminName">管理员</span>
                    <i class="fas fa-chevron-down"></i>
                </div>
            </div>
        </div>

        <div class="page-content">
            <div class="page-header">
                <h1 class="page-title">客服运营</h1>
                <p class="page-description">实时会话监控、转人工配置与知识库管理</p>
            </div>

            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-icon" style="background:#007bff">
                        <i class="fas fa-comments"></i>
                    </div>
                    <div class="stat-content">
                        <div class="stat-number" id="activeSessions">0</div>
                        <div class="stat-label">在线会话</div>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon" style="background:#28a745">
                        <i class="fas fa-user-clock"></i>
                    </div>
                    <div class="stat-content">
                        <div class="stat-number" id="waitingQueue">0</div>
                        <div class="stat-label">排队人数</div>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon" style="background:#ffc107">
                        <i class="fas fa-stopwatch"></i>
                    </div>
                    <div class="stat-content">
                        <div class="stat-number" id="avgResponse">0s</div>
                        <div class="stat-label">平均响应</div>
                    </div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon" style="background:#dc3545">
                        <i class="fas fa-exchange-alt"></i>
                    </div>
                    <div class="stat-content">
                        <div class="stat-number" id="transferToday">0</div>
                        <div class="stat-label">今日转人工</div>
                    </div>
                </div>
            </div>

            <div class="card">
                <div class="card-header">
                    <h3 class="card-title"><i class="fas fa-headset"></i> 会话监控</h3>
                    <div class="card-actions">
                        <button class="btn btn-secondary btn-sm" onclick="refreshSessions()"><i class="fas fa-sync-alt"></i> 刷新</button>
                    </div>
                </div>
                <div class="card-body">
                    <div class="table-container">
                        <table class="data-table" id="sessionsTable">
                            <thead>
                                <tr>
                                    <th>会话ID</th>
                                    <th>用户</th>
                                    <th>状态</th>
                                    <th>模式</th>
                                    <th>开始时间</th>
                                    <th>最后消息</th>
                                    <th>操作</th>
                                </tr>
                            </thead>
                            <tbody id="sessionsTableBody"></tbody>
                        </table>
                    </div>
                </div>
            </div>

            <div class="card">
                <div class="card-header">
                    <h3 class="card-title"><i class="fas fa-database"></i> 知识库</h3>
                    <div class="card-actions">
                        <button class="btn btn-primary btn-sm" data-roles="SUPER_ADMIN,OPS" onclick="addKbItem()"><i class="fas fa-plus"></i> 新增条目</button>
                    </div>
                </div>
                <div class="card-body">
                    <div class="table-container">
                        <table class="data-table" id="kbTable">
                            <thead>
                                <tr>
                                    <th>标题</th>
                                    <th>分类</th>
                                    <th>更新时间</th>
                                    <th>状态</th>
                                    <th>操作</th>
                                </tr>
                            </thead>
                            <tbody id="kbTableBody"></tbody>
                        </table>
                    </div>
                </div>
            </div>

            <div class="card">
                <div class="card-header">
                    <h3 class="card-title"><i class="fas fa-signal"></i> 实时通道</h3>
                    <div class="card-actions">
                        <span id="wsStatus" class="status-badge status-inactive">未连接</span>
                        <button class="btn btn-primary btn-sm" onclick="connectWS()"><i class="fas fa-plug"></i> 连接</button>
                        <button class="btn btn-secondary btn-sm" onclick="disconnectWS()"><i class="fas fa-unlink"></i> 断开</button>
                    </div>
                </div>
                <div class="card-body">
                    <div id="wsLog" style="height:200px; overflow:auto; background:#f8f9fa; border-radius:6px; padding:10px"></div>
                </div>
            </div>
        </div>
    </div>

    <div class="modal" id="userMenuModal">
        <div class="modal-content" style="max-width: 300px;">
            <div class="modal-header">
                <h3 class="modal-title">用户菜单</h3>
                <button class="modal-close" onclick="ModalManager.hide('userMenuModal')">&times;</button>
            </div>
            <div class="modal-body">
                <div class="user-menu">
                    <a href="#" class="user-menu-item"><i class="fas fa-user"></i> 个人资料</a>
                    <a href="#" class="user-menu-item"><i class="fas fa-key"></i> 修改密码</a>
                    <a href="#" class="user-menu-item"><i class="fas fa-cog"></i> 系统设置</a>
                    <hr style="margin: 10px 0;">
                    <a href="#" class="user-menu-item" onclick="adminLogout()"><i class="fas fa-sign-out-alt"></i> 退出登录</a>
                </div>
            </div>
        </div>
    </div>

    <script src="../js/admin.js"></script>
    <script>
        class SessionsTableManager extends DataTableManager {
            createTableRow(s) {
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td><strong>${s.id}</strong></td>
                    <td>${s.username}</td>
                    <td><span class="status-badge ${s.status==='active'?'status-active':s.status==='waiting'?'status-pending':'status-inactive'}">${getStatusText(s.status)}</span></td>
                    <td>${s.mode}</td>
                    <td>${AdminUtils.formatDate(s.startTime, 'MM-DD HH:mm')}</td>
                    <td>${s.lastMessage}</td>
                    <td>
                        <button class="btn btn-sm btn-secondary" onclick="viewSession('${s.id}')"><i class="fas fa-eye"></i></button>
                        <button class="btn btn-sm btn-warning" data-roles="CS,SUPER_ADMIN" onclick="transferToAgent('${s.id}')"><i class="fas fa-exchange-alt"></i></button>
                        <button class="btn btn-sm btn-danger" data-roles="CS,SUPER_ADMIN" onclick="endSession('${s.id}')"><i class="fas fa-times"></i></button>
                    </td>
                `;
                return row;
            }
        }

        let sessionsTableManager;
        let wsTimer = null;
        let kbItems = [];
        let sessions = [];

        document.addEventListener('DOMContentLoaded', function() {
            const adminUser = AdminUtils.storage.get('admin-user');
            if (adminUser) document.getElementById('adminName').textContent = adminUser.name || '管理员';
            sessionsTableManager = new SessionsTableManager('sessionsTable', { pageSize: 10, searchable: false });
            loadSessions();
            loadKb();
            AdminUtils.applyPermissions();
        });

        function getStatusText(s) {
            const m = { active:'进行中', waiting:'排队中', closed:'已结束' };
            return m[s] || s;
        }

        function loadSessions() {
            sessions = Array.from({length: 12}).map((_,i)=>({
                id: 'S' + String(Date.now()+i),
                username: '用户' + (i+1),
                status: ['active','waiting','closed'][Math.floor(Math.random()*3)],
                mode: Math.random()>0.5 ? 'AI' : '人工',
                startTime: new Date(Date.now() - Math.random()*60*60*1000),
                lastMessage: Math.random()>0.5 ? '请问如何改签？' : '支付遇到问题'
            }));
            sessionsTableManager.setData(sessions);
            document.getElementById('activeSessions').textContent = sessions.filter(s=>s.status==='active').length;
            document.getElementById('waitingQueue').textContent = sessions.filter(s=>s.status==='waiting').length;
            document.getElementById('avgResponse').textContent = Math.floor(Math.random()*10+3)+'s';
            document.getElementById('transferToday').textContent = Math.floor(Math.random()*20);
        }

        function refreshSessions() { loadSessions(); AdminUtils.applyPermissions(); }

        function viewSession(id) { AdminUtils.showMessage('查看会话 '+id, 'info'); }
        function endSession(id) { AdminUtils.showMessage('结束会话 '+id, 'success'); }
        function transferToAgent(id) { AdminUtils.showMessage('已转人工 '+id, 'success'); }

        function loadKb() {
            kbItems = [
                { title:'改签规则', category:'政策', updated:'2025-01-10 10:20', enabled:true },
                { title:'支付失败处理', category:'故障', updated:'2025-01-08 15:45', enabled:true },
                { title:'退票手续费说明', category:'政策', updated:'2025-01-06 09:30', enabled:false }
            ];
            const tbody = document.getElementById('kbTableBody');
            tbody.innerHTML = kbItems.map((it,idx)=>`
                <tr>
                    <td><strong>${it.title}</strong></td>
                    <td>${it.category}</td>
                    <td>${it.updated}</td>
                    <td><span class="status-badge ${it.enabled?'status-active':'status-inactive'}">${it.enabled?'启用':'禁用'}</span></td>
                    <td>
                        <button class="btn btn-sm btn-primary" data-roles="SUPER_ADMIN,OPS" onclick="editKb(${idx})"><i class="fas fa-edit"></i></button>
                        <button class="btn btn-sm btn-secondary" onclick="previewKb(${idx})"><i class="fas fa-eye"></i></button>
                    </td>
                </tr>
            `).join('');
        }

        function addKbItem() { AdminUtils.showMessage('新增条目', 'info'); }
        function editKb(i) { AdminUtils.showMessage('编辑条目 '+kbItems[i].title, 'info'); }
        function previewKb(i) { AdminUtils.showMessage('预览：'+kbItems[i].title, 'info'); }

        function connectWS() {
            document.getElementById('wsStatus').className = 'status-badge status-active';
            document.getElementById('wsStatus').textContent = '已连接';
            const log = document.getElementById('wsLog');
            log.innerHTML = '';
            wsTimer = setInterval(()=>{
                const msg = '消息 '+Math.random().toString(36).slice(2,7)+' 接收';
                const div = document.createElement('div');
                div.textContent = msg;
                log.appendChild(div);
                log.scrollTop = log.scrollHeight;
            }, 1000);
        }

        function disconnectWS() {
            document.getElementById('wsStatus').className = 'status-badge status-inactive';
            document.getElementById('wsStatus').textContent = '未连接';
            const log = document.getElementById('wsLog');
            log.innerHTML = '';
            if (wsTimer) { clearInterval(wsTimer); wsTimer = null; }
        }

        function showUserMenu() { ModalManager.show('userMenuModal'); }
    </script>
</body>
</html>
