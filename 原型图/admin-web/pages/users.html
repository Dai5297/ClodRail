<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>用户管理 - 铁路票务管理系统</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="../css/admin.css">
</head>
<body>
    <!-- 侧边栏 -->
    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <img src="https://trae-api-sg.mchost.guru/api/ide/v1/text_to_image?prompt=modern%20minimalist%20train%20logo%20icon%20blue%20gradient%20circular%20design&image_size=square" alt="Logo" class="logo">
            <h3>管理系统</h3>
        </div>
        <nav class="sidebar-menu">
            <a href="../index.html" class="menu-item">
                <i class="fas fa-tachometer-alt"></i>
                <span>仪表板</span>
            </a>
            <a href="users.html" class="menu-item active">
                <i class="fas fa-users"></i>
                <span>用户管理</span>
            </a>
            <a href="trains.html" class="menu-item">
                <i class="fas fa-train"></i>
                <span>车次管理</span>
            </a>
            <a href="orders.html" class="menu-item">
                <i class="fas fa-ticket-alt"></i>
                <span>订单管理</span>
            </a>
            <a href="statistics.html" class="menu-item">
                <i class="fas fa-chart-bar"></i>
                <span>数据统计</span>
            </a>
            <a href="settings.html" class="menu-item">
                <i class="fas fa-cog"></i>
                <span>系统设置</span>
            </a>
        </nav>
    </div>

    <!-- 主内容区域 -->
    <div class="main-content">
        <!-- 顶部导航栏 -->
        <div class="top-navbar">
            <div class="navbar-left">
                <button class="sidebar-toggle" id="sidebarToggle">
                    <i class="fas fa-bars"></i>
                </button>
                <div class="breadcrumb">
                    <a href="../index.html"><i class="fas fa-home"></i></a>
                    <span>/</span>
                    <span>用户管理</span>
                </div>
            </div>
            <div class="navbar-right">
                <div class="user-info" onclick="showUserMenu()">
                    <div class="user-avatar">
                        <i class="fas fa-user"></i>
                    </div>
                    <span id="adminName">管理员</span>
                    <i class="fas fa-chevron-down"></i>
                </div>
            </div>
        </div>

        <!-- 页面内容 -->
        <div class="page-content">
            <div class="page-header">
                <h1 class="page-title">用户管理</h1>
                <p class="page-description">管理系统用户信息、权限和状态</p>
            </div>

            <!-- 操作栏 -->
            <div class="card">
                <div class="card-body">
                    <div class="search-bar">
                        <div class="form-group search-input">
                            <input type="text" class="form-control" id="userSearch" placeholder="搜索用户名、邮箱或手机号...">
                        </div>
                        <div class="form-group">
                            <select class="form-control" id="statusFilter">
                                <option value="">全部状态</option>
                                <option value="active">活跃</option>
                                <option value="inactive">禁用</option>
                                <option value="pending">待审核</option>
                            </select>
                        </div>
                        <button class="btn btn-primary" onclick="searchUsers()">
                            <i class="fas fa-search"></i> 搜索
                        </button>
                        <button class="btn btn-success" onclick="showAddUserModal()">
                            <i class="fas fa-plus"></i> 新增用户
                        </button>
                        <button class="btn btn-secondary" onclick="exportUsers()">
                            <i class="fas fa-download"></i> 导出
                        </button>
                    </div>
                </div>
            </div>

            <!-- 用户列表 -->
            <div class="card">
                <div class="card-header">
                    <h3 class="card-title">
                        <i class="fas fa-users"></i>
                        用户列表
                    </h3>
                    <div class="card-actions">
                        <span id="userCount">共 0 个用户</span>
                    </div>
                </div>
                <div class="card-body">
                    <div class="table-container">
                        <table class="data-table" id="usersTable">
                            <thead>
                                <tr>
                                    <th>
                                        <input type="checkbox" id="selectAll" onchange="toggleSelectAll()">
                                    </th>
                                    <th data-sort="id">ID</th>
                                    <th data-sort="username">用户名</th>
                                    <th data-sort="name">姓名</th>
                                    <th data-sort="email">邮箱</th>
                                    <th data-sort="phone">手机号</th>
                                    <th data-sort="status">状态</th>
                                    <th data-sort="registerTime">注册时间</th>
                                    <th data-sort="lastLogin">最后登录</th>
                                    <th>操作</th>
                                </tr>
                            </thead>
                            <tbody id="usersTableBody">
                                <!-- 动态加载 -->
                            </tbody>
                        </table>
                    </div>
                    
                    <!-- 批量操作 -->
                    <div class="batch-actions" id="batchActions" style="display: none; margin-top: 15px;">
                        <button class="btn btn-warning btn-sm" onclick="batchUpdateStatus('inactive')">
                            <i class="fas fa-ban"></i> 批量禁用
                        </button>
                        <button class="btn btn-success btn-sm" onclick="batchUpdateStatus('active')">
                            <i class="fas fa-check"></i> 批量启用
                        </button>
                        <button class="btn btn-danger btn-sm" data-roles="SUPER_ADMIN" onclick="batchDeleteUsers()">
                            <i class="fas fa-trash"></i> 批量删除
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 新增/编辑用户模态框 -->
    <div class="modal" id="userModal">
        <div class="modal-content" style="max-width: 600px;">
            <div class="modal-header">
                <h3 class="modal-title" id="userModalTitle">新增用户</h3>
                <button class="modal-close" onclick="ModalManager.hide('userModal')">&times;</button>
            </div>
            <form id="userForm">
                <div class="modal-body">
                    <input type="hidden" id="userId" name="id">
                    
                    <div class="form-row">
                        <div class="form-group">
                            <label class="form-label" for="username">用户名 *</label>
                            <input type="text" class="form-control" id="username" name="username" required>
                        </div>
                        <div class="form-group">
                            <label class="form-label" for="name">姓名 *</label>
                            <input type="text" class="form-control" id="name" name="name" required>
                        </div>
                    </div>
                    
                    <div class="form-row">
                        <div class="form-group">
                            <label class="form-label" for="email">邮箱 *</label>
                            <input type="email" class="form-control" id="email" name="email" required>
                        </div>
                        <div class="form-group">
                            <label class="form-label" for="phone">手机号 *</label>
                            <input type="tel" class="form-control" id="phone" name="phone" required>
                        </div>
                    </div>
                    
                    <div class="form-row">
                        <div class="form-group">
                            <label class="form-label" for="password">密码</label>
                            <input type="password" class="form-control" id="password" name="password">
                            <small class="form-text">编辑时留空表示不修改密码</small>
                        </div>
                        <div class="form-group">
                            <label class="form-label" for="status">状态</label>
                            <select class="form-control" id="status" name="status">
                                <option value="active">活跃</option>
                                <option value="inactive">禁用</option>
                                <option value="pending">待审核</option>
                            </select>
                        </div>
                    </div>
                    
                    <div class="form-group">
                        <label class="form-label" for="role">角色权限</label>
                        <select class="form-control" id="role" name="role">
                            <option value="user">普通用户</option>
                            <option value="vip">VIP用户</option>
                            <option value="admin">管理员</option>
                        </select>
                    </div>
                    
                    <div class="form-group">
                        <label class="form-label" for="remark">备注</label>
                        <textarea class="form-control" id="remark" name="remark" rows="3" placeholder="用户备注信息..."></textarea>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" onclick="ModalManager.hide('userModal')">取消</button>
                    <button type="submit" class="btn btn-primary">保存</button>
                </div>
            </form>
        </div>
    </div>

    <!-- 用户详情模态框 -->
    <div class="modal" id="userDetailModal">
        <div class="modal-content" style="max-width: 700px;">
            <div class="modal-header">
                <h3 class="modal-title">用户详情</h3>
                <button class="modal-close" onclick="ModalManager.hide('userDetailModal')">&times;</button>
            </div>
            <div class="modal-body">
                <div id="userDetailContent">
                    <!-- 动态加载用户详情 -->
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" onclick="ModalManager.hide('userDetailModal')">关闭</button>
            </div>
        </div>
    </div>

    <!-- 用户菜单 -->
    <div class="modal" id="userMenuModal">
        <div class="modal-content" style="max-width: 300px;">
            <div class="modal-header">
                <h3 class="modal-title">用户菜单</h3>
                <button class="modal-close" onclick="ModalManager.hide('userMenuModal')">&times;</button>
            </div>
            <div class="modal-body">
                <div class="user-menu">
                    <a href="#" class="user-menu-item">
                        <i class="fas fa-user"></i>
                        个人资料
                    </a>
                    <a href="#" class="user-menu-item">
                        <i class="fas fa-key"></i>
                        修改密码
                    </a>
                    <a href="#" class="user-menu-item">
                        <i class="fas fa-cog"></i>
                        系统设置
                    </a>
                    <hr style="margin: 10px 0;">
                    <a href="#" class="user-menu-item" onclick="adminLogout()">
                        <i class="fas fa-sign-out-alt"></i>
                        退出登录
                    </a>
                </div>
            </div>
        </div>
    </div>

    <script src="../js/admin.js"></script>
    <script>
        // 用户数据表格管理器
        class UsersTableManager extends DataTableManager {
            createTableRow(user) {
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td>
                        <input type="checkbox" class="user-checkbox" value="${user.id}" onchange="updateBatchActions()">
                    </td>
                    <td>${user.id}</td>
                    <td>${user.username}</td>
                    <td>${user.name}</td>
                    <td>${user.email}</td>
                    <td>${user.phone}</td>
                    <td>
                        <span class="status-badge status-${user.status === 'active' ? 'active' : user.status === 'pending' ? 'pending' : 'inactive'}">
                            ${getStatusText(user.status)}
                        </span>
                    </td>
                    <td>${AdminUtils.formatDate(user.registerTime, 'YYYY-MM-DD')}</td>
                    <td>${user.lastLogin ? AdminUtils.formatDate(user.lastLogin, 'YYYY-MM-DD') : '从未登录'}</td>
                    <td>
                        <button class="btn btn-sm btn-primary" onclick="viewUser(${user.id})" title="查看详情">
                            <i class="fas fa-eye"></i>
                        </button>
                        <button class="btn btn-sm btn-warning" onclick="editUser(${user.id})" title="编辑">
                            <i class="fas fa-edit"></i>
                        </button>
                        <button class="btn btn-sm btn-danger" data-roles="SUPER_ADMIN" onclick="deleteUser(${user.id})" title="删除">
                            <i class="fas fa-trash"></i>
                        </button>
                    </td>
                `;
                return row;
            }
        }

        // 全局变量
        let usersTableManager;
        let allUsers = [];

        // 页面初始化
        document.addEventListener('DOMContentLoaded', function() {
            initUsersPage();
            loadUsers();
        });

        // 初始化用户页面
        function initUsersPage() {
            // 设置管理员名称
            const adminUser = AdminUtils.storage.get('admin-user');
            if (adminUser) {
                document.getElementById('adminName').textContent = adminUser.name || '管理员';
            }

            // 初始化数据表格
            usersTableManager = new UsersTableManager('usersTable', {
                pageSize: 15,
                searchable: false // 使用自定义搜索
            });
            window.usersTableManager = usersTableManager;

            // 绑定表单提交事件
            document.getElementById('userForm').addEventListener('submit', handleUserSubmit);

            // 绑定搜索事件
            document.getElementById('userSearch').addEventListener('input', 
                AdminUtils.debounce(searchUsers, 300)
            );
            document.getElementById('statusFilter').addEventListener('change', searchUsers);
        }

        // 加载用户数据
        function loadUsers() {
            // 模拟从API加载用户数据
            allUsers = MockDataGenerator.generateUsers(50);
            updateUsersDisplay();
        }

        // 更新用户显示
        function updateUsersDisplay() {
            usersTableManager.setData(allUsers);
            document.getElementById('userCount').textContent = `共 ${allUsers.length} 个用户`;
        }

        // 搜索用户
        function searchUsers() {
            const searchTerm = document.getElementById('userSearch').value.toLowerCase();
            const statusFilter = document.getElementById('statusFilter').value;
            
            let filteredUsers = MockDataGenerator.generateUsers(50);
            
            // 文本搜索
            if (searchTerm) {
                filteredUsers = filteredUsers.filter(user => 
                    user.username.toLowerCase().includes(searchTerm) ||
                    user.name.toLowerCase().includes(searchTerm) ||
                    user.email.toLowerCase().includes(searchTerm) ||
                    user.phone.includes(searchTerm)
                );
            }
            
            // 状态筛选
            if (statusFilter) {
                filteredUsers = filteredUsers.filter(user => user.status === statusFilter);
            }
            
            allUsers = filteredUsers;
            updateUsersDisplay();
        }

        // 获取状态文本
        function getStatusText(status) {
            const statusMap = {
                'active': '活跃',
                'inactive': '禁用',
                'pending': '待审核'
            };
            return statusMap[status] || status;
        }

        // 显示新增用户模态框
        function showAddUserModal() {
            document.getElementById('userModalTitle').textContent = '新增用户';
            document.getElementById('userForm').reset();
            document.getElementById('userId').value = '';
            document.getElementById('password').required = true;
            ModalManager.show('userModal');
        }

        // 编辑用户
        function editUser(userId) {
            const user = allUsers.find(u => u.id === userId);
            if (!user) return;
            
            document.getElementById('userModalTitle').textContent = '编辑用户';
            document.getElementById('userId').value = user.id;
            document.getElementById('username').value = user.username;
            document.getElementById('name').value = user.name;
            document.getElementById('email').value = user.email;
            document.getElementById('phone').value = user.phone;
            document.getElementById('status').value = user.status;
            document.getElementById('password').required = false;
            
            ModalManager.show('userModal');
        }

        // 查看用户详情
        function viewUser(userId) {
            const user = allUsers.find(u => u.id === userId);
            if (!user) return;
            
            const detailContent = document.getElementById('userDetailContent');
            detailContent.innerHTML = `
                <div class="user-detail">
                    <div class="detail-section">
                        <h4>基本信息</h4>
                        <div class="detail-grid">
                            <div class="detail-item">
                                <label>用户ID:</label>
                                <span>${user.id}</span>
                            </div>
                            <div class="detail-item">
                                <label>用户名:</label>
                                <span>${user.username}</span>
                            </div>
                            <div class="detail-item">
                                <label>姓名:</label>
                                <span>${user.name}</span>
                            </div>
                            <div class="detail-item">
                                <label>邮箱:</label>
                                <span>${user.email}</span>
                            </div>
                            <div class="detail-item">
                                <label>手机号:</label>
                                <span>${user.phone}</span>
                            </div>
                            <div class="detail-item">
                                <label>状态:</label>
                                <span class="status-badge status-${user.status === 'active' ? 'active' : user.status === 'pending' ? 'pending' : 'inactive'}">
                                    ${getStatusText(user.status)}
                                </span>
                            </div>
                        </div>
                    </div>
                    
                    <div class="detail-section">
                        <h4>时间信息</h4>
                        <div class="detail-grid">
                            <div class="detail-item">
                                <label>注册时间:</label>
                                <span>${AdminUtils.formatDate(user.registerTime)}</span>
                            </div>
                            <div class="detail-item">
                                <label>最后登录:</label>
                                <span>${user.lastLogin ? AdminUtils.formatDate(user.lastLogin) : '从未登录'}</span>
                            </div>
                        </div>
                    </div>
                    
                    <div class="detail-section">
                        <h4>统计信息</h4>
                        <div class="detail-grid">
                            <div class="detail-item">
                                <label>订单数量:</label>
                                <span>${Math.floor(Math.random() * 50)}</span>
                            </div>
                            <div class="detail-item">
                                <label>消费金额:</label>
                                <span>¥${(Math.random() * 10000).toFixed(2)}</span>
                            </div>
                        </div>
                    </div>
                </div>
            `;
            
            ModalManager.show('userDetailModal');
        }

        // 删除用户
        function deleteUser(userId) {
            AdminUtils.confirm('确定要删除这个用户吗？此操作不可恢复。', () => {
                // 模拟删除操作
                allUsers = allUsers.filter(u => u.id !== userId);
                updateUsersDisplay();
                AdminUtils.showMessage('用户删除成功', 'success');
            });
        }

        // 处理用户表单提交
        function handleUserSubmit(e) {
            e.preventDefault();
            
            const formData = new FormData(e.target);
            const userData = Object.fromEntries(formData.entries());
            
            // 验证数据
            if (!AdminUtils.validateEmail(userData.email)) {
                AdminUtils.showMessage('请输入有效的邮箱地址', 'error');
                return;
            }
            
            if (!AdminUtils.validatePhone(userData.phone)) {
                AdminUtils.showMessage('请输入有效的手机号', 'error');
                return;
            }
            
            // 模拟保存操作
            if (userData.id) {
                // 编辑用户
                const userIndex = allUsers.findIndex(u => u.id == userData.id);
                if (userIndex !== -1) {
                    allUsers[userIndex] = { ...allUsers[userIndex], ...userData, id: parseInt(userData.id) };
                    AdminUtils.showMessage('用户更新成功', 'success');
                }
            } else {
                // 新增用户
                const newUser = {
                    ...userData,
                    id: Math.max(...allUsers.map(u => u.id)) + 1,
                    registerTime: new Date(),
                    lastLogin: null
                };
                allUsers.unshift(newUser);
                AdminUtils.showMessage('用户创建成功', 'success');
            }
            
            updateUsersDisplay();
            ModalManager.hide('userModal');
        }

        // 切换全选
        function toggleSelectAll() {
            const selectAll = document.getElementById('selectAll');
            const checkboxes = document.querySelectorAll('.user-checkbox');
            
            checkboxes.forEach(checkbox => {
                checkbox.checked = selectAll.checked;
            });
            
            updateBatchActions();
        }

        // 更新批量操作显示
        function updateBatchActions() {
            const checkedBoxes = document.querySelectorAll('.user-checkbox:checked');
            const batchActions = document.getElementById('batchActions');
            
            if (checkedBoxes.length > 0) {
                batchActions.style.display = 'block';
            } else {
                batchActions.style.display = 'none';
            }
        }

        // 批量更新状态
        function batchUpdateStatus(status) {
            const checkedBoxes = document.querySelectorAll('.user-checkbox:checked');
            const userIds = Array.from(checkedBoxes).map(cb => parseInt(cb.value));
            
            if (userIds.length === 0) {
                AdminUtils.showMessage('请选择要操作的用户', 'warning');
                return;
            }
            
            AdminUtils.confirm(`确定要${status === 'active' ? '启用' : '禁用'}选中的 ${userIds.length} 个用户吗？`, () => {
                userIds.forEach(userId => {
                    const user = allUsers.find(u => u.id === userId);
                    if (user) {
                        user.status = status;
                    }
                });
                
                updateUsersDisplay();
                document.getElementById('selectAll').checked = false;
                updateBatchActions();
                AdminUtils.showMessage(`批量${status === 'active' ? '启用' : '禁用'}成功`, 'success');
            });
        }

        // 批量删除用户
        function batchDeleteUsers() {
            const checkedBoxes = document.querySelectorAll('.user-checkbox:checked');
            const userIds = Array.from(checkedBoxes).map(cb => parseInt(cb.value));
            
            if (userIds.length === 0) {
                AdminUtils.showMessage('请选择要删除的用户', 'warning');
                return;
            }
            
            AdminUtils.confirm(`确定要删除选中的 ${userIds.length} 个用户吗？此操作不可恢复。`, () => {
                allUsers = allUsers.filter(u => !userIds.includes(u.id));
                updateUsersDisplay();
                document.getElementById('selectAll').checked = false;
                updateBatchActions();
                AdminUtils.showMessage('批量删除成功', 'success');
            });
        }

        // 导出用户数据
        function exportUsers() {
            const exportData = allUsers.map(user => ({
                'ID': user.id,
                '用户名': user.username,
                '姓名': user.name,
                '邮箱': user.email,
                '手机号': user.phone,
                '状态': getStatusText(user.status),
                '注册时间': AdminUtils.formatDate(user.registerTime),
                '最后登录': user.lastLogin ? AdminUtils.formatDate(user.lastLogin) : '从未登录'
            }));
            
            AdminUtils.exportToCSV(exportData, `用户数据_${AdminUtils.formatDate(new Date(), 'YYYY-MM-DD')}.csv`);
        }

        // 显示用户菜单
        function showUserMenu() {
            ModalManager.show('userMenuModal');
        }

        // 添加用户详情样式
        const userDetailStyles = document.createElement('style');
        userDetailStyles.textContent = `
            .user-detail {
                max-height: 60vh;
                overflow-y: auto;
            }
            
            .detail-section {
                margin-bottom: 25px;
                padding-bottom: 20px;
                border-bottom: 1px solid #eee;
            }
            
            .detail-section:last-child {
                border-bottom: none;
            }
            
            .detail-section h4 {
                margin-bottom: 15px;
                color: #333;
                font-size: 16px;
                font-weight: 600;
            }
            
            .detail-grid {
                display: grid;
                grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
                gap: 15px;
            }
            
            .detail-item {
                display: flex;
                flex-direction: column;
                gap: 5px;
            }
            
            .detail-item label {
                font-weight: 500;
                color: #666;
                font-size: 14px;
            }
            
            .detail-item span {
                color: #333;
                font-size: 14px;
            }
            
            .user-menu-item {
                display: flex;
                align-items: center;
                gap: 10px;
                padding: 12px 16px;
                color: #333;
                text-decoration: none;
                border-radius: 6px;
                transition: background-color 0.3s ease;
            }
            
            .user-menu-item:hover {
