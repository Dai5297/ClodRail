<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>个人中心 - 铁路订票系统</title>
    <link rel="stylesheet" href="css/common.css">
    <link rel="stylesheet" href="css/profile.css">
    <link rel="stylesheet" href="css/floating-ai.css">
</head>
<body>
    <!-- 导航栏 -->
    <nav class="navbar">
        <div class="nav-container">
            <div class="nav-brand">
                <img src="images/logo.png" alt="Logo" class="nav-logo">
                <span class="nav-title">铁路订票系统</span>
            </div>
            <div class="nav-menu">
                <a href="index.html" class="nav-link">首页</a>
                <a href="train-search.html" class="nav-link">车票</a>
                <a href="points-mall.html" class="nav-link">积分商城</a>
                <a href="ai-assistant.html" class="nav-link">AI助手</a>
                <a href="profile.html" class="nav-link active">个人中心</a>
            </div>
            <div class="nav-user">
                <div class="user-info">
                    <span class="user-name" id="userName">张三</span>
                    <span class="user-points">积分: <span id="userPoints">1200</span></span>
                </div>
                <button class="btn btn-outline" id="logoutBtn">退出</button>
            </div>
        </div>
    </nav>

    <!-- 主要内容 -->
    <div class="main-container">
        <!-- 侧边菜单 -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="user-avatar">
                    <img src="https://trae-api-sg.mchost.guru/api/ide/v1/text_to_image?prompt=professional%20user%20avatar%20icon%20blue%20background%20simple%20design&image_size=square" alt="用户头像" id="userAvatar">
                </div>
                <div class="user-details">
                    <h3 class="user-name" id="sidebarUserName">张三</h3>
                    <p class="user-level">普通会员</p>
                    <div class="user-stats">
                        <div class="stat-item">
                            <span class="stat-value" id="totalOrders">12</span>
                            <span class="stat-label">总订单</span>
                        </div>
                        <div class="stat-item">
                            <span class="stat-value" id="totalPoints">1200</span>
                            <span class="stat-label">积分</span>
                        </div>
                    </div>
                </div>
            </div>
            
            <nav class="sidebar-nav">
                <ul class="nav-list">
                    <li class="nav-item">
                        <a href="#" class="nav-link active" data-section="orders">
                            <span class="nav-icon">📋</span>
                            <span class="nav-text">我的订单</span>
                        </a>
                    </li>
                    <li class="nav-item">
                        <a href="#" class="nav-link" data-section="profile">
                            <span class="nav-icon">👤</span>
                            <span class="nav-text">个人信息</span>
                        </a>
                    </li>
                    <li class="nav-item">
                        <a href="#" class="nav-link" data-section="passengers">
                            <span class="nav-icon">👥</span>
                            <span class="nav-text">常用乘客</span>
                        </a>
                    </li>
                    <li class="nav-item">
                        <a href="#" class="nav-link" data-section="points">
                            <span class="nav-icon">⭐</span>
                            <span class="nav-text">积分明细</span>
                        </a>
                    </li>
                    <li class="nav-item">
                        <a href="#" class="nav-link" data-section="coupons">
                            <span class="nav-icon">🎫</span>
                            <span class="nav-text">优惠券</span>
                        </a>
                    </li>
                    <li class="nav-item">
                        <a href="#" class="nav-link" data-section="settings">
                            <span class="nav-icon">⚙️</span>
                            <span class="nav-text">账户设置</span>
                        </a>
                    </li>
                </ul>
            </nav>
        </aside>

        <!-- 内容区域 -->
        <main class="content-area">
            <!-- 我的订单 -->
            <section id="ordersSection" class="content-section active">
                <div class="section-header">
                    <h2 class="section-title">我的订单</h2>
                    <div class="order-filters">
                        <button class="filter-btn active" data-status="all">全部</button>
                        <button class="filter-btn" data-status="paid">已支付</button>
                        <button class="filter-btn" data-status="completed">已完成</button>
                        <button class="filter-btn" data-status="cancelled">已取消</button>
                    </div>
                </div>
                
                <div class="orders-container" id="ordersContainer">
                    <!-- 订单列表将通过JavaScript动态生成 -->
                </div>
            </section>

            <!-- 个人信息 -->
            <section id="profileSection" class="content-section">
                <div class="section-header">
                    <h2 class="section-title">个人信息</h2>
                    <button class="btn btn-primary" id="editProfileBtn">编辑</button>
                </div>
                
                <div class="profile-form">
                    <div class="form-group">
                        <label class="form-label">姓名</label>
                        <input type="text" class="form-input" id="profileName" value="张三" readonly>
                    </div>
                    <div class="form-group">
                        <label class="form-label">手机号</label>
                        <input type="tel" class="form-input" id="profilePhone" value="138****8888" readonly>
                    </div>
                    <div class="form-group">
                        <label class="form-label">邮箱</label>
                        <input type="email" class="form-input" id="profileEmail" value="zhangsan@example.com" readonly>
                    </div>
                    <div class="form-group">
                        <label class="form-label">身份证号</label>
                        <input type="text" class="form-input" id="profileIdNumber" value="1234****5678" readonly>
                    </div>
                    <div class="form-actions" id="profileActions" style="display: none;">
                        <button class="btn btn-primary" id="saveProfileBtn">保存</button>
                        <button class="btn btn-outline" id="cancelEditBtn">取消</button>
                    </div>
                </div>
            </section>

            <!-- 常用乘客 -->
            <section id="passengersSection" class="content-section">
                <div class="section-header">
                    <h2 class="section-title">常用乘客</h2>
                    <button class="btn btn-primary" id="addPassengerBtn">添加乘客</button>
                </div>
                
                <div class="passengers-container" id="passengersContainer">
                    <!-- 乘客列表将通过JavaScript动态生成 -->
                </div>
            </section>

            <!-- 积分明细 -->
            <section id="pointsSection" class="content-section">
                <div class="section-header">
                    <h2 class="section-title">积分明细</h2>
                    <div class="points-summary">
                        <div class="points-total">
                            <span class="points-value" id="pointsTotal">1200</span>
                            <span class="points-label">当前积分</span>
                        </div>
                    </div>
                </div>
                
                <div class="points-history" id="pointsHistory">
                    <!-- 积分记录将通过JavaScript动态生成 -->
                </div>
            </section>

            <!-- 优惠券 -->
            <section id="couponsSection" class="content-section">
                <div class="section-header">
                    <h2 class="section-title">我的优惠券</h2>
                    <div class="coupon-filters">
                        <button class="filter-btn active" data-status="available">可用</button>
                        <button class="filter-btn" data-status="used">已使用</button>
                        <button class="filter-btn" data-status="expired">已过期</button>
                    </div>
                </div>
                
                <div class="coupons-container" id="couponsContainer">
                    <!-- 优惠券列表将通过JavaScript动态生成 -->
                </div>
            </section>

            <!-- 账户设置 -->
            <section id="settingsSection" class="content-section">
                <div class="section-header">
                    <h2 class="section-title">账户设置</h2>
                </div>
                
                <div class="settings-container">
                    <div class="setting-item">
                        <div class="setting-info">
                            <h4 class="setting-title">修改密码</h4>
                            <p class="setting-desc">定期修改密码，保护账户安全</p>
                        </div>
                        <button class="btn btn-outline" id="changePasswordBtn">修改</button>
                    </div>
                    
                    <div class="setting-item">
                        <div class="setting-info">
                            <h4 class="setting-title">消息通知</h4>
                            <p class="setting-desc">接收订单状态、优惠活动等通知</p>
                        </div>
                        <label class="switch">
                            <input type="checkbox" id="notificationSwitch" checked>
                            <span class="slider"></span>
                        </label>
                    </div>
                    
                    <div class="setting-item">
                        <div class="setting-info">
                            <h4 class="setting-title">隐私设置</h4>
                            <p class="setting-desc">管理个人信息的显示和使用</p>
                        </div>
                        <button class="btn btn-outline" id="privacySettingsBtn">设置</button>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <!-- 添加乘客模态框 -->
    <div id="addPassengerModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 class="modal-title">添加常用乘客</h3>
                <button class="modal-close" id="closePassengerModal">&times;</button>
            </div>
            <div class="modal-body">
                <form id="addPassengerForm">
                    <div class="form-group">
                        <label class="form-label">姓名 *</label>
                        <input type="text" class="form-input" id="passengerName" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">证件类型 *</label>
                        <select class="form-select" id="passengerIdType" required>
                            <option value="身份证">身份证</option>
                            <option value="护照">护照</option>
                            <option value="港澳通行证">港澳通行证</option>
                            <option value="台湾通行证">台湾通行证</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label class="form-label">证件号码 *</label>
                        <input type="text" class="form-input" id="passengerIdNumber" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">手机号</label>
                        <input type="tel" class="form-input" id="passengerPhone">
                    </div>
                    <div class="form-group">
                        <label class="form-label">乘客类型 *</label>
                        <select class="form-select" id="passengerType" required>
                            <option value="成人">成人</option>
                            <option value="儿童">儿童</option>
                            <option value="学生">学生</option>
                        </select>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button class="btn btn-outline" id="cancelAddPassenger">取消</button>
                <button class="btn btn-primary" id="confirmAddPassenger">添加</button>
            </div>
        </div>
    </div>

    <!-- 修改密码模态框 -->
    <div id="changePasswordModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 class="modal-title">修改密码</h3>
                <button class="modal-close" id="closePasswordModal">&times;</button>
            </div>
            <div class="modal-body">
                <form id="changePasswordForm">
                    <div class="form-group">
                        <label class="form-label">当前密码 *</label>
                        <input type="password" class="form-input" id="currentPassword" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">新密码 *</label>
                        <input type="password" class="form-input" id="newPassword" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">确认新密码 *</label>
                        <input type="password" class="form-input" id="confirmPassword" required>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button class="btn btn-outline" id="cancelChangePassword">取消</button>
                <button class="btn btn-primary" id="confirmChangePassword">确认修改</button>
            </div>
        </div>
    </div>

    <script src="js/utils.js"></script>
    <script src="js/common.js"></script>
    <script src="js/profile.js"></script>
    <script src="js/floating-ai.js"></script>
</body>
</html
