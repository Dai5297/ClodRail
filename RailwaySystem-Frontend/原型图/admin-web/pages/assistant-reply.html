<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>客服回复 - 铁路票务管理系统</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="../css/admin.css">
</head>
<body>
    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <img src="https://trae-api-sg.mchost.guru/api/ide/v1/text_to_image?prompt=modern%20minimalist%20train%20logo%20icon%20blue%20gradient%20circular%20design&image_size=square" alt="Logo" class="logo">
            <h3>管理系统</h3>
        </div>
        <nav class="sidebar-menu">
            <a href="../index.html" class="menu-item" data-roles="SUPER_ADMIN,OPS,FINANCE,CS">
                <i class="fas fa-tachometer-alt"></i>
                <span>仪表板</span>
            </a>
            <a href="users.html" class="menu-item" data-roles="SUPER_ADMIN,OPS">
                <i class="fas fa-users"></i>
                <span>用户管理</span>
            </a>
            <a href="trains.html" class="menu-item" data-roles="SUPER_ADMIN,OPS">
                <i class="fas fa-train"></i>
                <span>车次管理</span>
            </a>
            <a href="orders.html" class="menu-item" data-roles="SUPER_ADMIN,OPS,FINANCE">
                <i class="fas fa-ticket-alt"></i>
                <span>订单管理</span>
            </a>
            <a href="statistics.html" class="menu-item" data-roles="SUPER_ADMIN,FINANCE">
                <i class="fas fa-chart-bar"></i>
                <span>数据统计</span>
            </a>
            <a href="assistant.html" class="menu-item" data-roles="SUPER_ADMIN,CS">
                <i class="fas fa-headset"></i>
                <span>客服运营</span>
            </a>
            <a href="assistant-reply.html" class="menu-item active" data-roles="SUPER_ADMIN,CS">
                <i class="fas fa-comment-dots"></i>
                <span>客服回复</span>
            </a>
            <a href="settings.html" class="menu-item" data-roles="SUPER_ADMIN">
                <i class="fas fa-cog"></i>
                <span>系统设置</span>
            </a>
        </nav>
    </div>

    <div class="main-content">
        <div class="top-navbar">
            <div class="navbar-left">
                <button class="sidebar-toggle" id="sidebarToggle">
                    <i class="fas fa-bars"></i>
                </button>
                <div class="breadcrumb">
                    <a href="../index.html"><i class="fas fa-home"></i></a>
                    <span>/</span>
                    <span>客服回复</span>
                </div>
            </div>
            <div class="navbar-right">
                <div class="user-info" onclick="showUserMenu()">
                    <div class="user-avatar">
                        <i class="fas fa-user"></i>
                    </div>
                    <span id="adminName">客服</span>
                    <i class="fas fa-chevron-down"></i>
                </div>
            </div>
        </div>

        <div class="page-content">
            <div class="page-header">
                <h1 class="page-title">客服回复</h1>
                <p class="page-description">选择会话并与用户实时沟通</p>
            </div>

            <div class="card">
                <div class="card-body">
                    <div class="chat-layout">
                        <div class="session-panel">
                            <div class="panel-header">
                                <h3 class="card-title"><i class="fas fa-list"></i> 会话列表</h3>
                            </div>
                            <div class="session-list" id="sessionList"></div>
                        </div>
                        <div class="chat-panel">
                            <div class="panel-header">
                                <h3 class="card-title"><i class="fas fa-comments"></i> 会话</h3>
                                <div class="panel-actions">
                                    <span id="chatSessionId" class="status-badge status-inactive">未选择</span>
                                </div>
                            </div>
                            <div class="chat-window" id="chatWindow"></div>
                            <div class="chat-input">
                                <input type="text" id="chatMessage" class="form-control" placeholder="输入消息...">
                                <button class="btn btn-primary" data-roles="SUPER_ADMIN,CS" onclick="sendMessage()"><i class="fas fa-paper-plane"></i> 发送</button>
                                <button class="btn btn-secondary" onclick="quickReply('您好，请问需要什么帮助？')">快捷：问候</button>
                                <button class="btn btn-secondary" onclick="quickReply('请提供订单号，我来为您查询。')">快捷：订单查询</button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="modal" id="userMenuModal">
        <div class="modal-content" style="max-width: 300px;">
            <div class="modal-header">
                <h3 class="modal-title">用户菜单</h3>
                <button class="modal-close" onclick="ModalManager.hide('userMenuModal')">&times;</button>
            </div>
            <div class="modal-body">
                <div class="user-menu">
                    <a href="#" class="user-menu-item"><i class="fas fa-user"></i> 个人资料</a>
                    <a href="#" class="user-menu-item"><i class="fas fa-key"></i> 修改密码</a>
                    <a href="#" class="user-menu-item"><i class="fas fa-cog"></i> 系统设置</a>
                    <hr style="margin: 10px 0;">
                    <a href="#" class="user-menu-item" onclick="adminLogout()"><i class="fas fa-sign-out-alt"></i> 退出登录</a>
                </div>
            </div>
        </div>
    </div>

    <script src="../js/admin.js"></script>
    <script>
        let currentSession = null;
        let sessionData = [];
        document.addEventListener('DOMContentLoaded', function() {
            const adminUser = AdminUtils.storage.get('admin-user');
            if (adminUser) document.getElementById('adminName').textContent = adminUser.name || '客服';
            initSessions();
            AdminUtils.applyPermissions();
        });

        function initSessions() {
            sessionData = Array.from({length: 10}).map((_,i)=>({
                id: 'S' + (1000+i),
                user: '用户' + (i+1),
                last: Math.random()>0.5 ? '想咨询改签' : '支付失败怎么处理',
                unread: Math.floor(Math.random()*3)
            }));
            const list = document.getElementById('sessionList');
            list.innerHTML = sessionData.map(s=>`
                <div class="session-item" onclick="selectSession('${s.id}')">
                    <div class="session-title">${s.user}</div>
                    <div class="session-last">${s.last}</div>
                    ${s.unread ? `<span class="session-badge">${s.unread}</span>` : ''}
                </div>
            `).join('');
        }

        function selectSession(id) {
            currentSession = id;
            document.getElementById('chatSessionId').className = 'status-badge status-active';
            document.getElementById('chatSessionId').textContent = id;
            const win = document.getElementById('chatWindow');
            win.innerHTML = '';
            addMessage('对方', '您好，我想咨询一下订单状态');
            addMessage('我', '好的，请提供订单号');
        }

        function addMessage(sender, text) {
            const win = document.getElementById('chatWindow');
            const wrap = document.createElement('div');
            wrap.className = sender === '我' ? 'message-row right' : 'message-row';
            const bubble = document.createElement('div');
            bubble.className = 'message-bubble';
            bubble.textContent = text;
            wrap.appendChild(bubble);
            win.appendChild(wrap);
            win.scrollTop = win.scrollHeight;
        }

        function sendMessage() {
            if (!currentSession) { AdminUtils.showMessage('请先选择会话', 'warning'); return; }
            const input = document.getElementById('chatMessage');
            const text = input.value.trim();
            if (!text) return;
            addMessage('我', text);
            input.value = '';
            setTimeout(()=>{ addMessage('对方', '收到'); }, 800);
        }

        function quickReply(text) {
            document.getElementById('chatMessage').value = text;
        }

        function showUserMenu() { ModalManager.show('userMenuModal'); }
    </script>
</body>
</html>
