<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>积分商城 - 铁路订票系统</title>
    <link rel="stylesheet" href="css/common.css">
    <link rel="stylesheet" href="css/points-mall.css">
    <link rel="stylesheet" href="css/floating-ai.css">
</head>
<body>
    <!-- 导航栏 -->
    <nav class="navbar">
        <div class="nav-container">
            <div class="nav-brand">
                <img src="images/logo.png" alt="Logo" class="nav-logo">
                <span class="nav-title">铁路订票系统</span>
            </div>
            <div class="nav-menu">
                <a href="index.html" class="nav-link">首页</a>
                <a href="train-search.html" class="nav-link">车票</a>
                <a href="points-mall.html" class="nav-link active">积分商城</a>
                <a href="ai-assistant.html" class="nav-link">AI助手</a>
                <a href="profile.html" class="nav-link">个人中心</a>
            </div>
            <div class="nav-user">
                <div class="user-info">
                    <span class="user-name" id="userName">张三</span>
                    <span class="user-points">积分: <span id="userPoints">1200</span></span>
                </div>
                <button class="btn btn-outline" id="logoutBtn">退出</button>
            </div>
        </div>
    </nav>

    <!-- 积分商城横幅 -->
    <section class="mall-banner">
        <div class="banner-content">
            <div class="banner-text">
                <h1 class="banner-title">积分商城</h1>
                <p class="banner-subtitle">用积分兑换精美礼品，让旅行更有意义</p>
                <div class="user-points-display">
                    <span class="points-label">我的积分:</span>
                    <span class="points-value" id="bannerUserPoints">1200</span>
                </div>
            </div>
            <div class="banner-image">
                <img src="https://trae-api-sg.mchost.guru/api/ide/v1/text_to_image?prompt=points%20mall%20banner%20illustration%20shopping%20rewards%20blue%20theme&image_size=landscape_16_9" alt="积分商城">
            </div>
        </div>
    </section>

    <!-- 主要内容 -->
    <div class="main-container">
        <!-- 侧边分类菜单 -->
        <aside class="category-sidebar">
            <div class="sidebar-header">
                <h3>商品分类</h3>
            </div>
            <nav class="category-nav">
                <ul class="category-list">
                    <li class="category-item">
                        <a href="#" class="category-link active" data-category="all">
                            <span class="category-icon">🛍️</span>
                            <span class="category-name">全部商品</span>
                        </a>
                    </li>
                    <li class="category-item">
                        <a href="#" class="category-link" data-category="coupons">
                            <span class="category-icon">🎫</span>
                            <span class="category-name">优惠券</span>
                        </a>
                    </li>
                    <li class="category-item">
                        <a href="#" class="category-link" data-category="travel">
                            <span class="category-icon">🧳</span>
                            <span class="category-name">旅行用品</span>
                        </a>
                    </li>
                    <li class="category-item">
                        <a href="#" class="category-link" data-category="electronics">
                            <span class="category-icon">📱</span>
                            <span class="category-name">数码产品</span>
                        </a>
                    </li>
                    <li class="category-item">
                        <a href="#" class="category-link" data-category="lifestyle">
                            <span class="category-icon">🏠</span>
                            <span class="category-name">生活用品</span>
                        </a>
                    </li>
                    <li class="category-item">
                        <a href="#" class="category-link" data-category="food">
                            <span class="category-icon">🍫</span>
                            <span class="category-name">美食特产</span>
                        </a>
                    </li>
                </ul>
            </nav>
        </aside>

        <!-- 商品展示区域 -->
        <main class="products-area">
            <!-- 筛选和排序 -->
            <div class="products-header">
                <div class="products-info">
                    <h2 class="products-title" id="productsTitle">全部商品</h2>
                    <span class="products-count" id="productsCount">共 12 件商品</span>
                </div>
                <div class="products-controls">
                    <div class="sort-options">
                        <label class="sort-label">排序:</label>
                        <select class="sort-select" id="sortSelect">
                            <option value="default">默认排序</option>
                            <option value="points-asc">积分从低到高</option>
                            <option value="points-desc">积分从高到低</option>
                            <option value="popularity">热门优先</option>
                        </select>
                    </div>
                    <div class="view-toggle">
                        <button class="view-btn active" data-view="grid" title="网格视图">
                            <span class="view-icon">⊞</span>
                        </button>
                        <button class="view-btn" data-view="list" title="列表视图">
                            <span class="view-icon">☰</span>
                        </button>
                    </div>
                </div>
            </div>

            <!-- 商品网格 -->
            <div class="products-grid" id="productsGrid">
                <!-- 商品将通过JavaScript动态生成 -->
            </div>

            <!-- 加载更多 -->
            <div class="load-more-container" id="loadMoreContainer">
                <button class="btn btn-outline" id="loadMoreBtn">加载更多</button>
            </div>
        </main>
    </div>

    <!-- 商品详情模态框 -->
    <div id="productModal" class="modal">
        <div class="modal-content product-modal">
            <div class="modal-header">
                <h3 class="modal-title" id="productModalTitle">商品详情</h3>
                <button class="modal-close" id="closeProductModal">&times;</button>
            </div>
            <div class="modal-body">
                <div class="product-detail">
                    <div class="product-images">
                        <div class="main-image">
                            <img id="productMainImage" src="" alt="商品图片">
                        </div>
                        <div class="image-thumbnails" id="productThumbnails">
                            <!-- 缩略图将动态生成 -->
                        </div>
                    </div>
                    <div class="product-info">
                        <h2 class="product-name" id="productDetailName"></h2>
                        <div class="product-price">
                            <span class="points-price" id="productDetailPoints"></span>
                            <span class="original-price" id="productDetailOriginal"></span>
                        </div>
                        <div class="product-tags" id="productDetailTags">
                            <!-- 标签将动态生成 -->
                        </div>
                        <div class="product-description">
                            <h4>商品描述</h4>
                            <p id="productDetailDescription"></p>
                        </div>
                        <div class="product-specs" id="productDetailSpecs">
                            <!-- 规格将动态生成 -->
                        </div>
                        <div class="exchange-section">
                            <div class="quantity-selector">
                                <label>数量:</label>
                                <div class="quantity-controls">
                                    <button class="quantity-btn" id="decreaseBtn">-</button>
                                    <input type="number" class="quantity-input" id="quantityInput" value="1" min="1" max="10">
                                    <button class="quantity-btn" id="increaseBtn">+</button>
                                </div>
                            </div>
                            <div class="total-points">
                                <span>总计: </span>
                                <span class="total-value" id="totalPoints">0</span>
                                <span> 积分</span>
                            </div>
                            <button class="btn btn-primary exchange-btn" id="exchangeBtn">立即兑换</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 兑换确认模态框 -->
    <div id="exchangeModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 class="modal-title">确认兑换</h3>
                <button class="modal-close" id="closeExchangeModal">&times;</button>
            </div>
            <div class="modal-body">
                <div class="exchange-confirmation">
                    <div class="confirm-product">
                        <img id="confirmProductImage" src="" alt="商品图片">
                        <div class="confirm-info">
                            <h4 id="confirmProductName"></h4>
                            <p class="confirm-quantity">数量: <span id="confirmQuantity"></span></p>
                            <p class="confirm-points">所需积分: <span id="confirmPoints"></span></p>
                        </div>
                    </div>
                    <div class="points-balance">
                        <div class="balance-item">
                            <span class="balance-label">当前积分:</span>
                            <span class="balance-value" id="currentPointsBalance">1200</span>
                        </div>
                        <div class="balance-item">
                            <span class="balance-label">兑换后余额:</span>
                            <span class="balance-value" id="afterExchangeBalance">1000</span>
                        </div>
                    </div>
                    <div class="delivery-info">
                        <h4>收货信息</h4>
                        <div class="form-group">
                            <label class="form-label">收货人姓名 *</label>
                            <input type="text" class="form-input" id="recipientName" placeholder="请输入收货人姓名">
                        </div>
                        <div class="form-group">
                            <label class="form-label">联系电话 *</label>
                            <input type="tel" class="form-input" id="recipientPhone" placeholder="请输入联系电话">
                        </div>
                        <div class="form-group">
                            <label class="form-label">收货地址 *</label>
                            <textarea class="form-textarea" id="recipientAddress" placeholder="请输入详细收货地址" rows="3"></textarea>
                        </div>
                    </div>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-outline" id="cancelExchangeBtn">取消</button>
                <button class="btn btn-primary" id="confirmExchangeBtn">确认兑换</button>
            </div>
        </div>
    </div>

    <!-- 兑换成功模态框 -->
    <div id="successModal" class="modal">
        <div class="modal-content success-modal">
            <div class="modal-body">
                <div class="success-content">
                    <div class="success-icon">✅</div>
                    <h3 class="success-title">兑换成功！</h3>
                    <p class="success-message">您的商品正在准备中，我们会尽快为您发货</p>
                    <div class="success-details">
                        <p>兑换单号: <span id="exchangeOrderNumber"></span></p>
                        <p>预计发货时间: 1-3个工作日</p>
                    </div>
                    <div class="success-actions">
                        <button class="btn btn-outline" onclick="window.location.href='profile.html'">查看订单</button>
                        <button class="btn btn-primary" id="continueShoppingBtn">继续购物</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="js/utils.js"></script>
    <script src="js/common.js"></script>
    <script src="js/points-mall.js"></script>
    <script src="js/floating-ai.js"></script>
</body>
</html>
