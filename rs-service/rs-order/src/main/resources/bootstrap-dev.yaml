logging:
  level:
    com.rs: info        # 您的项目包名设置为ERROR级别
    org.springframework: WARN
    root: INFO
  file:
    name: logs/application-error.log  # 错误日志文件
  logback:
    rollingpolicy:
      max-file-size: 10MB            # 单个文件最大大小
      max-history: 30                # 保留天数
      file-name-pattern: logs/application-error.%d{yyyy-MM-dd}.%i.log